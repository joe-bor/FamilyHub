name: CI
permissions:
  contents: read
  statuses: write
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run lint
      - run: npm run test:coverage
      - name: Start backend container
        run: docker compose -f docker-compose.e2e.yml up -d --wait
      - name: Run E2E tests (real backend)
        run: npm run test:e2e
        env:
          VITE_USE_MOCK_API: "false"
          E2E_REAL_API: "true"
      - name: Stop backend container
        if: always()
        run: docker compose -f docker-compose.e2e.yml down
      - run: npm run build
      - name: Collect Lighthouse reports
        run: npx lhci collect
      - name: Assert Lighthouse thresholds
        run: npx lhci assert
      - name: Debug Lighthouse output
        run: ls -la .lighthouseci/ || echo "Directory not found"
      - name: Upload Lighthouse to temporary storage
        run: npx lhci upload
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lighthouse-report-${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.sha }}
          path: .lighthouseci/
          retention-days: 90
